syntax = "proto3";

package swipe.v1;

option go_package = "swipe-mgz/pkg/api/swipe/v1;swipev1";

import "google/protobuf/timestamp.proto";

service SwipeService {
  // Swipe registers a like/dislike from swiper toward swipee.
  // If both users have liked each other a Match is created and returned.
  rpc Swipe(SwipeRequest) returns (SwipeResponse);
  // ListMatches returns all matches of the caller.
  rpc ListMatches(ListMatchesRequest) returns (ListMatchesResponse);
  // UpdateLocation stores the caller's coordinates in the geo index.
  rpc UpdateLocation(UpdateLocationRequest) returns (UpdateLocationResponse);
  // GetCandidates returns nearby users within the service-configured radius.
  rpc GetCandidates(GetCandidatesRequest) returns (GetCandidatesResponse);
}

enum Direction {
  DIRECTION_UNSPECIFIED = 0;
  DIRECTION_LIKE = 1;
  DIRECTION_DISLIKE = 2;
}

message Swipe {
  int64 id = 1;
  string swiper_id = 2;
  string swipee_id = 3;
  Direction direction = 4;
  google.protobuf.Timestamp created_at = 5;
}

message Match {
  int64 id = 1;
  string user1_id = 2;
  string user2_id = 3;
  google.protobuf.Timestamp created_at = 4;
  // Второй участник матча относительно запрашивающего пользователя (ListMatches / Swipe).
  string peer_user_id = 5;
}

message Candidate {
  string user_id = 1;
  double longitude = 2;
  double latitude = 3;
  double distance_km = 4;
}

message SwipeRequest {
  string swiper_id = 1;
  string swipee_id = 2;
  Direction direction = 3;
}

message SwipeResponse {
  Swipe swipe = 1;
  Match match = 2; // optional — set only on mutual like
}

message ListMatchesRequest {
  string user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListMatchesResponse {
  repeated Match matches = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message UpdateLocationRequest {
  string user_id = 1;
  double longitude = 2;
  double latitude = 3;
}

message UpdateLocationResponse {}

message GetCandidatesRequest {
  string user_id = 1;
}

message GetCandidatesResponse {
  repeated Candidate candidates = 1;
}
