worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /var/log/nginx/access.log;
    error_log     /var/log/nginx/error.log warn;
    sendfile      on;

    # Точка входа снаружи — шлюз проксирует на HTTP-сервис свайпов.
    server {
        listen 8080;

        # Прямой прокси: клиент бьётся в тот же путь, что и у сервиса (/health, /v1/...).
        location / {
            proxy_http_version 1.1;
            proxy_pass http://swipe:8084;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # X-User-Id с мобильного / внешнего API пробрасывается как есть
        }

        # Вариант с префиксом маршрута шлюза: /swipe/v1/swipes → бэкенд /v1/swipes
        location /swipe/ {
            proxy_http_version 1.1;
            proxy_pass http://swipe:8084/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
